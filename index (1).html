<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskMovies - All Types of Movies Are Available Here</title>
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <!-- Logo -->
                <div class="logo">
                    <div class="logo-text">
                        <span class="logo-ask">Ask</span>
                        <span class="logo-movies">Movies</span>
                        <span class="logo-icon">🎥</span>
                    </div>
                    <div class="logo-underline"></div>
                </div>

                <!-- Header Controls -->
                <div class="header-controls">
                    <!-- Search -->
                    <div class="search-container">
                        <input type="text" id="searchInput" class="search-input" placeholder="Search movies...">
                        <button class="search-btn" id="searchBtn" aria-label="Search">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                    </div>

                    <!-- Hamburger Menu -->
                    <button class="menu-btn" id="menuBtn" aria-label="Menu">
                        <div class="menu-line"></div>
                        <div class="menu-line"></div>
                        <div class="menu-line"></div>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Tagline Banner -->
    <div class="tagline-banner">
        <p class="tagline-text">All Types of Movies Are Available Here</p>
    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-content">
            <a href="#" class="mobile-menu-item">Home</a>
            <a href="#" class="mobile-menu-item">About</a>
            <a href="#" class="mobile-menu-item">Contact</a>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Category Filters -->
            <section class="filter-section">
                <div class="filter-container">
                    <button class="filter-btn active" data-category="All">All</button>
                    <button class="filter-btn" data-category="Tamil">Tamil</button>
                    <button class="filter-btn" data-category="English">English</button>
                    <button class="filter-btn" data-category="Action">Action</button>
                    <button class="filter-btn" data-category="HD">HD</button>
                    <button class="filter-btn" data-category="PreDvd">PreDvd</button>
                </div>
            </section>

            <!-- Movies Grid -->
            <section class="movies-section">
                <div class="movies-grid" id="moviesGrid"></div>
            </section>

            <!-- No Results -->
            <div class="no-results" id="noResults">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <h3>No Results Found</h3>
                <p>Try adjusting your search or filter criteria</p>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <button class="pagination-btn" id="prevBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Previous
                </button>
                <div class="pagination-numbers" id="paginationNumbers"></div>
                <button class="pagination-btn" id="nextBtn">
                    Next
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <a href="https://t.me/askmovies" target="_blank" class="telegram-btn">
                    <span class="telegram-icon">✈️</span>
                    <span>Contact Us on Telegram</span>
                </a>
                <p>&copy; 2025 AskMovies. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Load JavaScript files -->
    <script src="js/movies-data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
